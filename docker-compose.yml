services:
  # PostgreSQL database shared by API and worker services.
  postgres:
    image: postgres:16
    container_name: webhook_pipeline_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-webhook_pipeline}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-webhook_pipeline}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # API service: runs migrations, then starts the Express server.
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: webhook_pipeline_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/webhook_pipeline
      API_PORT: ${API_PORT:-3000}
    ports:
      - '3000:3000'
    command: sh -c "node dist/db/migrate.js && node dist/main.js"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Worker service: polls for queued jobs and processes them.
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: webhook_pipeline_worker
    restart: on-failure
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/webhook_pipeline
      WORKER_POLL_INTERVAL_MS: ${WORKER_POLL_INTERVAL_MS:-5000}
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy

  # Second worker service for concurrent background processing.
  worker2:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: webhook_pipeline_worker_2
    restart: on-failure
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/webhook_pipeline
      WORKER_POLL_INTERVAL_MS: ${WORKER_POLL_INTERVAL_MS:-5000}
      WORKER_ID: worker-2
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  postgres_data:
