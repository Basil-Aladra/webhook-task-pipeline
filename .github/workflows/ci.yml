name: CI

on:
  # Run on pushes to main and PRs targeting main.
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job 1: Verify TypeScript correctness for API and worker packages.
  lint-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm install

      - name: Typecheck API
        run: npm run typecheck -w @webhook-pipeline/api

      - name: Typecheck Worker
        run: npm run typecheck -w @webhook-pipeline/worker

  # Job 2: Build all workspace packages after typecheck passes.
  build:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm install

      - name: Build shared package
        run: npm run build -w @webhook-pipeline/shared

      - name: Build API
        run: npm run build -w @webhook-pipeline/api

      - name: Build Worker
        run: npm run build -w @webhook-pipeline/worker

  # Job 3: Ensure Docker images for API and worker build successfully.
  docker-build:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t webhook-api .

      - name: Build Worker image
        run: docker build -f apps/worker/Dockerfile -t webhook-worker .
